---
- name: Install gh (macOS)
  community.general.homebrew:
    name: gh
    state: present
  when: ansible_os_family == "Darwin"

- name: Set gh apt arch (Debian)
  ansible.builtin.set_fact:
    gh_apt_arch: "{{ 'amd64' if ansible_architecture in ['x86_64', 'amd64'] else 'arm64' }}"
  when: ansible_os_family == "Debian"

- name: Ensure apt keyrings directory exists (Debian)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when: ansible_os_family == "Debian"

- name: Add GitHub CLI apt key (Debian)
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: "0644"
  become: true
  when: ansible_os_family == "Debian"

- name: Add GitHub CLI apt repository (Debian)
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ gh_apt_arch }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    filename: github-cli
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install gh (Debian)
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"
