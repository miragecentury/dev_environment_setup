---
- name: Install RTK
  ansible.builtin.shell:
    cmd: curl -fsSL {{ rtk_install_script }} | sh
    creates: "{{ ansible_env.HOME }}/.local/bin/rtk"
  environment:
    HOME: "{{ ansible_env.HOME }}"
  changed_when: true

- name: Verify RTK is Token Killer
  ansible.builtin.command: rtk gain
  environment:
    HOME: "{{ ansible_env.HOME }}"
    PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"
  changed_when: false

- name: Initialize RTK globally
  when: rtk_init_global | bool
  ansible.builtin.command:
    argv:
      - "{{ ansible_env.HOME }}/.local/bin/rtk"
      - init
      - -g
      - --auto-patch
  environment:
    HOME: "{{ ansible_env.HOME }}"
    PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"
  register: rtk_init
  changed_when: rtk_init.rc == 0

- name: Install CodeGraph CLI
  ansible.builtin.shell:
    cmd: curl -fsSL {{ codegraph_install_script }} | sh
    creates: "{{ ansible_env.HOME }}/.local/bin/codegraph"
  environment:
    HOME: "{{ ansible_env.HOME }}"
  changed_when: true

- name: Wire CodeGraph into AI agents
  ansible.builtin.command:
    argv:
      - "{{ ansible_env.HOME }}/.local/bin/codegraph"
      - install
      - --yes
      - --target=auto
      - --location=global
  environment:
    HOME: "{{ ansible_env.HOME }}"
    PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"
  register: codegraph_agents
  changed_when: codegraph_agents.rc == 0

- name: Tap OpenCode Homebrew repository (macOS)
  community.general.homebrew_tap:
    name: "{{ opencode_homebrew_tap }}"
    state: present
  when: ansible_os_family == "Darwin"

- name: Trust OpenCode Homebrew tap (macOS)
  ansible.builtin.command:
    argv:
      - brew
      - trust
      - --tap
      - "{{ opencode_homebrew_tap }}"
  changed_when: false
  when: ansible_os_family == "Darwin"

- name: Install OpenCode (macOS)
  community.general.homebrew:
    name: opencode
    state: present
  when: ansible_os_family == "Darwin"
  register: brew_opencode
  failed_when:
    - brew_opencode is failed
    - "'Error:' in (brew_opencode.msg | default(''))"

- name: Install OpenCode (Debian)
  ansible.builtin.shell:
    cmd: curl -fsSL {{ opencode_install_script }} | bash -s -- --no-modify-path
    creates: "{{ ansible_env.HOME }}/.opencode/bin/opencode"
  environment:
    HOME: "{{ ansible_env.HOME }}"
  when: ansible_os_family == "Debian"
  changed_when: true

- name: Install OpenSpec globally
  community.general.npm:
    name: "{{ openspec_npm_package }}"
    global: true
    state: present
  environment:
    HOME: "{{ ansible_env.HOME }}"
    PATH: "{{ ansible_env.PATH }}"

- name: Ensure OpenSpec zsh completion directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/completions"
    state: directory
    mode: "0755"

- name: Install OpenSpec zsh completions
  ansible.builtin.command:
    argv:
      - openspec
      - completion
      - install
      - zsh
  environment:
    HOME: "{{ ansible_env.HOME }}"
    PATH: "{{ ansible_env.PATH }}"
  register: openspec_completion
  changed_when: "'installed successfully' in (openspec_completion.stdout | default('') | lower)"

- name: Install caveman skills globally
  ansible.builtin.command:
    argv:
      - npx
      - --yes
      - skills
      - add
      - "{{ caveman_skills_repo }}"
      - --all
      - -g
      - -y
      - --copy
  environment:
    HOME: "{{ ansible_env.HOME }}"
    PATH: "{{ ansible_env.PATH }}"
  register: caveman_skills_install
  changed_when: "'Done!' in (caveman_skills_install.stdout | default(''))"

- name: Install ponytail skills globally
  ansible.builtin.command:
    argv:
      - npx
      - --yes
      - skills
      - add
      - "{{ ponytail_skills_repo }}"
      - --all
      - -g
      - -y
      - --copy
  environment:
    HOME: "{{ ansible_env.HOME }}"
    PATH: "{{ ansible_env.PATH }}"
  register: ponytail_skills_install
  changed_when: "'Done!' in (ponytail_skills_install.stdout | default(''))"
