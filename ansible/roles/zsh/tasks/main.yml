---
- name: Update bash (Debian)
  ansible.builtin.apt:
    name: bash
    state: latest
  become: true
  when: ansible_os_family == "Debian"

- name: Update bash (macOS)
  community.general.homebrew:
    name: bash
    state: latest
  when: ansible_os_family == "Darwin"

- name: Install zsh (Debian)
  ansible.builtin.apt:
    name: zsh
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install zsh (macOS)
  community.general.homebrew:
    name: zsh
    state: present
  when: ansible_os_family == "Darwin"
  register: brew_zsh
  # Recent Homebrew prints "✔︎ Bottle ..." progress to stderr, which the module
  # misreads as a failure. A genuine brew failure always emits an "Error:" line,
  # so only treat it as failed when that appears.
  failed_when:
    - brew_zsh is failed
    - "'Error:' in (brew_zsh.msg | default(''))"

# Zinit self-bootstraps from .zshrc on first shell start; it only needs git
# (already present, since this repo was cloned with it). No install task needed.

- name: Include Oh My Posh install tasks for macOS
  ansible.builtin.include_tasks: darwin.yml
  when: ansible_os_family == "Darwin"

- name: Include Oh My Posh install tasks for Debian
  ansible.builtin.include_tasks: debian.yml
  when: ansible_os_family == "Debian"

- name: Ensure Oh My Posh config directory exists
  ansible.builtin.file:
    path: "{{ omp_config | dirname }}"
    state: directory
    mode: "0755"

- name: Deploy Oh My Posh config
  ansible.builtin.copy:
    src: oh-my-posh.omp.toml
    dest: "{{ omp_config }}"
    mode: "0644"

- name: Deploy .zshrc
  ansible.builtin.template:
    src: .zshrc.j2
    dest: "{{ ansible_env.HOME }}/.zshrc"
    mode: "0644"

- name: Get zsh path
  ansible.builtin.command: which zsh
  register: zsh_path
  changed_when: false

- name: Get current login shell (Debian)
  ansible.builtin.command: getent passwd {{ username }}
  register: shell_info
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Get current login shell (macOS)
  ansible.builtin.command: dscl . -read /Users/{{ username }} UserShell
  register: shell_info
  changed_when: false
  when: ansible_os_family == "Darwin"

- name: Set zsh as default shell
  ansible.builtin.user:
    name: "{{ username }}"
    shell: "{{ zsh_path.stdout }}"
  become: true
  when: "'/zsh' not in shell_info.stdout"
