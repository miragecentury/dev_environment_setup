"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
final_space = true
version = 3

[[blocks]]
type = "prompt"
alignment = "left"
new_line = true

  [[blocks.segments]]
  type = "session"
  style = "plain"
  foreground = "#61AFEF"
  template = "{{ if .SSHSession }}\ueba9 {{ end }}{{ .UserName }}{{ if .SSHSession }}@{{ .HostName }}{{ end }} "

  [[blocks.segments]]
  type = "git"
  style = "plain"
  foreground_templates = [
    "{{ if or (.Working.Changed) (.Staging.Changed) }}#FFEB3B{{ end }}",
    "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}",
    "{{ if gt .Ahead 0 }}#B388FF{{ end }}",
    "{{ if gt .Behind 0 }}#B388FB{{ end }}"
  ]
  template = "{{ .UpstreamIcon }}{{ ( abbrev 40 .HEAD ) }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} "
  [blocks.segments.properties]
  fetch_status = true
  fetch_upstream_icon = true
  source = "cli"

[[blocks]]
type = "prompt"
alignment = "right"

  [[blocks.segments]]
  type = "python"
  style = "plain"
  foreground = "#32a852"
  template = "\ue73c {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ end }}"
  [blocks.segments.properties]
  fetch_virtual_env = true
  fetch_version = true
  display_mode = "environment"

  [[blocks.segments]]
  type = "kubectl"
  style = "plain"
  foreground = "#61AFEF"
  template = "\ue81d {{.Context}}{{if .Namespace}}::{{.Namespace}}{{end}}"

  [[blocks.segments]]
  type = "time"
  style = "plain"
  format = "%H:%M:%S"
  foreground = "#32a852"
  [blocks.segments.properties]
  style = "bold"

[[blocks]]
type = "prompt"
alignment = "left"
new_line = true

  [[blocks.segments]]
  type = "path"
  style = "plain"
  foreground = "#61AFEF"
  [blocks.segments.properties]
  style = "agnoster_full"
  [blocks.segments.properties.mapped_locations]
  "~/projects/github" = "\ue709 "

  [[blocks.segments]]
  type = "text"
  style = "plain"
  template = "❯"
  foreground = "#61AFEF"
  [blocks.segments.properties]
  style = "bold"

console_title_template = "{{.Folder}}"

[transient_prompt]
  background = "transparent"
  foreground = "#61AFEF"
  template = "\ue285 "
