---
- name: Install kubectl (macOS)
  community.general.homebrew:
    name: kubectl
    state: present
  when: ansible_os_family == "Darwin"

- name: Set kubectl arch for Linux
  ansible.builtin.set_fact:
    kubectl_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"
  when: ansible_os_family == "Debian"

- name: Retrieve latest kubectl version
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: true
  register: kubectl_version
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Check installed kubectl version
  ansible.builtin.command: kubectl version --client -o json
  register: kubectl_client_json
  ignore_errors: true
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Parse installed kubectl version
  ansible.builtin.set_fact:
    kubectl_installed_version: "{{ (kubectl_client_json.stdout | from_json).clientVersion.gitVersion }}"
  when:
    - ansible_os_family == "Debian"
    - kubectl_client_json.rc == 0

- name: Install kubectl (Debian)
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/{{ kubectl_arch }}/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"
  become: true
  when:
    - ansible_os_family == "Debian"
    - kubectl_installed_version | default('') != kubectl_version.content | trim
