---

- name: Auto-Setup Dev Environment
  hosts:
    - localhost
  connection: local
  gather_facts: true
  vars:
    username: "{{ lookup('env', 'USER') }}"
  roles:
    - role: homebrew
    - role: tools
    - role: gh
    - role: fonts
    - role: zsh
    - role: agent_skills
    - role: ai_tools
    - role: security
    - role: kubernetes
