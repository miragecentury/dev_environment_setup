---

- name: Auto-Setup Dev Environment
  hosts:
    - localhost
  connection: local
  gather_facts: true
  vars:
    username: "{{ lookup('env', 'USER') }}"
  pre_tasks:
    - name: Configure Touch ID for sudo when available
      ansible.builtin.include_tasks: roles/security/tasks/touchid.yml
      when: ansible_os_family == "Darwin"
  roles:
    - role: homebrew
    - role: tools
    - role: python_tools
    - role: rust_tools
    - role: gh
    - role: fonts
    - role: iterm2
    - role: zsh
    - role: agent_skills
    - role: angular_tools
    - role: ai_tools
    - role: security
    - role: kubernetes
    - role: mirrord
    - role: mongosh
    - role: redis_tools
    - role: cilium_tools
    - role: argocd_kargo_tools
    - role: secrets_tools
    - role: podman_tools
    - role: pulumi
    - role: flutter
    - role: android_tools
