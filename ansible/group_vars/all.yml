---
# Oh My Posh config file deployed from roles/zsh/files/oh-my-posh.omp.toml
omp_config: "{{ ansible_env.HOME }}/.config/oh-my-posh/config.toml"

# SSH keys to load into the agent (paths relative to home)
github_ssh_identity: ~/.ssh/github
ssh_identities:
  - "{{ github_ssh_identity }}"
  - ~/.ssh/melanie.localunicorns.info
  - ~/.ssh/outside_cluster_tools_project_key

# Optional GPG key id for keychain plugin (leave empty to skip)
gpg_key_id: ""

# Classic CLI tools (htop, dig, nmap, …)
debian_cli_packages:
  - htop
  - dnsutils # dig, nslookup, host
  - nmap
  - jq
  - tree
  - netcat-openbsd
  - traceroute
  - mtr-tiny
  - tcpdump
  - whois
  - rsync
  - unzip
  - watch
  - ripgrep
  - fd-find
  - wget

homebrew_cli_packages:
  - htop
  - nmap
  - jq
  - tree
  - mtr
  - ripgrep
  - fd
  - wget

homebrew_python_tools:
  - poetry
  - uv
  - pre-commit

uv_install_script: https://astral.sh/uv/install.sh

rustup_install_script: https://sh.rustup.rs

angular_npm_packages:
  - "@angular/cli"
  - vite
  - typescript
  - tsx
  - eslint
  - prettier

# DeerHide agent skills (https://github.com/DeerHide/agent_skills)
agent_skills_repo: DeerHide/agent_skills

# mirrord (Debian install script; macOS uses Homebrew tap)
mirrord_install_script: https://raw.githubusercontent.com/metalbear-co/mirrord/main/scripts/install.sh

# krunkit VM runtime for podman machine on macOS Apple Silicon (Homebrew tap)
krunkit_homebrew_tap: slp/krunkit

# MongoDB shell (Debian uses official MongoDB apt repo)
mongodb_apt_version: "8.0"

# AI tooling
caveman_skills_repo: JuliusBrussee/caveman
ponytail_skills_repo: dietrichgebert/ponytail
rtk_install_script: https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh
codegraph_install_script: https://raw.githubusercontent.com/colbymchenry/codegraph/main/install.sh
rtk_init_global: true

# macOS: prompt for Touch ID when sudo asks for a password (falls back to password)
sudo_touchid: true

# macOS Homebrew casks to install
homebrew_casks:
  - freelens
  - wave
  - font-meslo-lg-nerd-font
  - cursor-cli

# Terminal font (a Nerd Font is required for the Oh My Posh prompt glyphs).
# Must match a family installed by the font cask above.
terminal_font: "MesloLGS Nerd Font Mono"

# Apps to apply terminal_font to. Both Cursor and Wave store settings as a flat
# JSON object, so we just merge these keys in (see the fonts role).
terminal_font_targets:
  - path: "{{ ansible_env.HOME }}/Library/Application Support/Cursor/User/settings.json"
    settings:
      "editor.fontFamily": "{{ terminal_font }}"
      "terminal.integrated.fontFamily": "{{ terminal_font }}"
  - path: "{{ ansible_env.HOME }}/.config/waveterm/settings.json"
    settings:
      "term:fontfamily": "{{ terminal_font }}"
